<h1>{{ product.name }}</h1>

{% if product.product_image %}
    <img src="{{ product.product_image.url }}" width="300">
{% else %}
    <p>Фото отсутствует</p>
{% endif %}

<p>{{ product.description }}</p>
<p>Цена: {{ product.price }} BYN</p>
<p>В наличии: {{ product.stock_quantity }} шт.</p>

{% if user.is_authenticated %}
    <a href="{% url 'add_to_cart' product.id %}">Добавить в корзину</a>
{% endif %}

<a href="/catalog/">Назад к каталогу</a>
